<style>
:root {
  --blue:#4054CC; --green:#45C945; --red:#C0303A;
  --grad:linear-gradient(135deg,#4054CC 0%,#45C945 100%);
  --bg:#F4F6F8; --surface:#FFFFFF; --border:#D8DAE8;
  --text:#1A1F2E; --muted:#959DAF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}

header{background:var(--grad);padding:40px 24px 48px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 50%,rgba(255,255,255,.08) 0%,transparent 60%);}
.hbadge{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:14px;}
header h1{font-size:clamp(24px,4vw,40px);font-weight:900;color:#fff;letter-spacing:-.5px;}
header p{margin-top:10px;font-size:15px;color:rgba(255,255,255,.8);font-weight:600;}

main{max-width:1000px;margin:-20px auto 40px;padding:0 20px;position:relative;z-index:1;}

.section-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(64,84,204,.06);margin-bottom:24px;}
.section-title{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* Tables */
.stat-table{width:100%;border-collapse:collapse;font-size:13px;}
.stat-table th{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;text-align:left;border-bottom:2px solid var(--border);}
.stat-table th.num{text-align:right;}
.stat-table td{padding:8px 8px;border-bottom:1px solid var(--bg);vertical-align:middle;}
.stat-table tr:last-child td{border-bottom:none;}
.stat-table tr:hover td{background:var(--bg);}

.rank-cell{font-size:11px;font-weight:800;color:var(--muted);width:28px;text-align:center;}
.name-cell{font-weight:800;}
.num-cell{text-align:right;font-weight:700;}

/* Position badge */
.pos-badge{display:inline-block;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;letter-spacing:.5px;}
.pos-G{background:#FDECEA;color:#C0303A;}
.pos-D{background:#E8F0FD;color:#4054CC;}
.pos-M{background:#EDFAED;color:#2A7A2A;}
.pos-A{background:#FFF4E0;color:#C08A00;}

/* Owner badges */
.owner-badges{display:flex;gap:3px;flex-wrap:wrap;}
.owner-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#fff;flex-shrink:0;cursor:help;}

/* Goals */
.goals-big{font-size:17px;font-weight:900;color:var(--blue);}
.hat-badge{display:inline-flex;align-items:center;gap:4px;background:#E8F0FD;color:var(--blue);padding:2px 10px;border-radius:20px;font-size:12px;font-weight:800;}

/* Ratings */
.avg-high{color:#2A7A2A;font-weight:900;}
.avg-low{color:var(--red);font-weight:900;}

/* ── FILTER TABS (section 7) ── */
.filter-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.player-tab{background:var(--bg);border:2px solid var(--border);border-radius:24px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;display:flex;align-items:center;gap:6px;}
.player-tab:hover{border-color:var(--blue);color:var(--blue);}
.player-tab.active{color:#fff;}
.player-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* MPG Player stats */
.mini-kpi{display:flex;gap:12px;margin-bottom:16px;}
.kpi-box{flex:1;background:var(--bg);border-radius:10px;padding:14px;text-align:center;}
.kpi-num{font-size:24px;font-weight:900;line-height:1;}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}

.mpg-stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
@media(max-width:700px){.mpg-stats-grid{grid-template-columns:1fr;}}

.mini-card{background:var(--bg);border-radius:12px;padding:16px;}
.mini-card-title{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.mini-stat-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.mini-stat-row:last-child{border-bottom:none;}
.mini-stat-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;flex:1;min-width:0;}
.mini-stat-name .rank-lbl{font-size:10px;font-weight:800;color:var(--muted);width:14px;text-align:right;flex-shrink:0;}
.mini-stat-val{font-size:12px;font-weight:900;flex-shrink:0;margin-left:8px;}
.mini-name-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.no-data{color:var(--muted);font-size:12px;padding:8px 0;font-style:italic;}

/* Sub impact */
.sub-tabs{display:flex;gap:8px;margin-bottom:16px;}
.sub-tab{background:var(--bg);border:2px solid var(--border);border-radius:24px;padding:5px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;}
.sub-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.swing-badge{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;}
.swing-DV{background:#EDFAED;color:#2A7A2A;}
.swing-NV{background:#E8F0FD;color:var(--blue);}
.swing-DN{background:#FFF4E0;color:#C08A00;}

footer{text-align:center;padding:28px;font-size:13px;color:var(--muted);font-weight:600;}
footer a{color:var(--blue);text-decoration:none;font-weight:700;}
footer span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;}
</style>
</head>

const POS_CLS = {G:'pos-G', D:'pos-D', M:'pos-M', A:'pos-A'};
const PLAYER_INITIALS = {raph:'SC',nico:'PU',francois:'CC',damien:'SM',greg:'CU',marc:'FM',pierre:'LU',manu:'PP'};

function posBadge(pos) {
  const cls = POS_CLS[pos] || 'pos-D';
  return `<span class="pos-badge ${cls}">${pos || '?'}</span>`;
}

function ownerBadges(owners) {
  if (!owners || !owners.length) return '';
  return '<div class="owner-badges">' +
    owners.map(pid => {
      const col = (DATA.colors || {})[pid] || '#888';
      const ini = PLAYER_INITIALS[pid] || pid.slice(0,2).toUpperCase();
      const name = (DATA.display_names || {})[pid] || pid;
      return `<span class="owner-badge" style="background:${col}" title="${name}">${ini}</span>`;
    }).join('') +
  '</div>';
}

function rankCell(i) {
  const medals = ['🥇','🥈','🥉'];
  if (i < 3) return `<td class="rank-cell">${medals[i]}</td>`;
  return `<td class="rank-cell" style="color:var(--muted)">${i+1}</td>`;
}

function section(icon, title, id, content) {
  return `<div class="section-card" id="${id}">
    <div class="section-title"><span>${icon}</span>${title}</div>
    ${content}
  </div>`;
}

// ── Section 5: Hat-trick Club ──────────────────────────────────────────────
function renderHatTricks() {
  if (!DATA.hat_tricks || !DATA.hat_tricks.length)
    return '<p class="no-data">Aucun hat-trick détecté</p>';
  const rows = DATA.hat_tricks.map((ht, i) => {
    const col = (DATA.colors || {})[ht.owner] || '#888';
    const ini = PLAYER_INITIALS[ht.owner] || '?';
    const ownerName = (DATA.display_names || {})[ht.owner] || ht.owner;
    const oppName = (DATA.display_names || {})[ht.opponent] || ht.opponent || '?';
    const scoreParts = (ht.score || '?-?').split('-');
    const won = scoreParts.length === 2 && parseFloat(scoreParts[0]) > parseFloat(scoreParts[1]);
    const scoreColor = won ? 'var(--green,#4caf50)' : 'var(--red,#e53935)';
    return `<tr>
      ${rankCell(i)}
      <td class="name-cell">${ht.name}</td>
      <td><span class="hat-badge">⚽ ${ht.goals} buts</span></td>
      <td style="color:var(--muted);font-size:12px">vs <b>${oppName}</b><br><span style="color:${scoreColor};font-weight:700">${ht.score}</span></td>
      <td style="color:var(--muted);font-size:12px;font-weight:700">J${ht.gw} · ${ht.season}</td>
      <td><span class="owner-badge" style="background:${col}" title="${ownerName}">${ini}</span></td>
    </tr>`;
  }).join('');
  return `<table class="stat-table">
    <thead><tr>
      <th></th><th>Joueur</th><th>Performance</th>
      <th>Adversaire</th><th>Journée</th><th>Owner</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderMpgSection() {
  const tabs = DATA.mpg_players.map(pid => {
    const col = (DATA.colors || {})[pid] || '#888';
    const name = (DATA.display_names || {})[pid] || pid;
    return `<button class="player-tab" data-pid="${pid}" onclick="selectMpgPlayer('${pid}')">

    </button>`;

  return `<div class="filter-tabs">${tabs}</div><div id="mpgPlayerContent"></div>`;

function miniRows(items, valFmt, valClass) {
  if (!items || !items.length)
    return '<p class="no-data">Pas de données suffisantes</p>';
  return items.map((p, i) =>
    `<div class="mini-stat-row">
      <span class="mini-stat-name">
        <span class="rank-lbl">${i+1}</span>
        ${posBadge(p.pos)}
        <span class="mini-name-text" title="${p.name}">${p.name}</span>
      </span>
      <span class="mini-stat-val ${valClass || ''}">${valFmt(p)}</span>
    </div>`
  ).join('');
}

function renderMpgPlayerStats(pid) {
  const d = DATA.by_mpg[pid];
  if (!d) return '<p class="no-data">Données manquantes</p>';
  const col = (DATA.colors || {})[pid] || '#888';
  return `
    <div class="mini-kpi">
      <div class="kpi-box">
        <div class="kpi-num" style="color:${col}">${d.total_goals}</div>
        <div class="kpi-lbl">Buts marqués</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-num" style="color:var(--red)">${d.rotaldos}</div>
        <div class="kpi-lbl">Rotaldos</div>
      </div>
    </div>
    <div class="mpg-stats-grid">
      <div class="mini-card">
        <div class="mini-card-title">🌟 Meilleurs</div>
        ${miniRows(d.best, p => p.avg.toFixed(2) + ' (' + p.matches + 'j)', 'avg-high')}
      </div>
      <div class="mini-card">
        <div class="mini-card-title">💀 Pires</div>
        ${miniRows(d.worst, p => p.avg.toFixed(2) + ' (' + p.matches + 'j)', 'avg-low')}
      </div>
      <div class="mini-card">
        <div class="mini-card-title">❤️ Fidèles</div>
        ${miniRows(d.fideles, p => p.appearances + ' app.', '')}
      </div>
    </div>`;
}

function selectMpgPlayer(pid) {
  document.querySelectorAll('.player-tab').forEach(btn => {
    const active = btn.dataset.pid === pid;
    btn.classList.toggle('active', active);
    if (active) {
      btn.style.background = (DATA.colors || {})[pid] || '#888';
      btn.style.borderColor = (DATA.colors || {})[pid] || '#888';
    } else {
      btn.style.background = '';
      btn.style.borderColor = '';
    }
  });
  document.getElementById('mpgPlayerContent').innerHTML = renderMpgPlayerStats(pid);
}

// ── Section 8: Changements Décisifs ───────────────────────────────────────
function swingBadge(swing) {
  const cls = {'D→V':'swing-DV','N→V':'swing-NV','D→N':'swing-DN'}[swing] || '';
  return `<span class="swing-badge ${cls}">${swing}</span>`;
}

let _subFilter = null;
let _subTab = 'missed';
const _SWING_PTS = {'D→V': 3, 'N→V': 2, 'D→N': 1};

function renderSubKpis(pid) {
  const missed  = (DATA.missed_decisive  || []).filter(e => !pid || e.owner === pid);
  const entered = (DATA.entered_decisive || []).filter(e => !pid || e.owner === pid);
  const lost   = missed.reduce((s, e)  => s + (_SWING_PTS[e.swing] || 0), 0);
  const gained = entered.reduce((s, e) => s + (_SWING_PTS[e.swing] || 0), 0);
  return `<div style="display:flex;gap:12px;margin-bottom:16px;">
    <div style="flex:1;background:#FDECEA;border-radius:12px;padding:14px;text-align:center;">
      <div style="font-size:28px;font-weight:900;color:var(--red)">${lost}</div>
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;">pts perdus · ratés</div>
    </div>
    <div style="flex:1;background:#EDFAED;border-radius:12px;padding:14px;text-align:center;">
      <div style="font-size:28px;font-weight:900;color:#2A7A2A">${gained}</div>
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;">pts gagnés · réussis</div>
    </div>
  </div>`;
}

function renderMissedSubs(pid) {
  const data = (DATA.missed_decisive || []).filter(e => !pid || e.owner === pid);
  if (!data.length) return '<p class="no-data">Aucun changement raté décisif pour ce joueur</p>';
  const rows = data.map((e, i) => {
    const col = (DATA.colors || {})[e.owner] || '#888';
    const ini = PLAYER_INITIALS[e.owner] || '?';
    const ownerName = (DATA.display_names || {})[e.owner] || e.owner;
    const oppName = (DATA.display_names || {})[e.opponent] || e.opponent || '?';
    return `<tr>
      ${rankCell(i)}
      <td class="name-cell">${e.sub}</td>
      <td><span class="hat-badge">⚽ ${e.goals} buts</span></td>
      <td style="font-size:12px;color:var(--muted)">devait remplacer <b style="color:var(--text)">${e.starter}</b><br>seuil ${e.threshold} · obtenu ${e.starter_rat}</td>
      <td style="font-size:12px">vs <b>${oppName}</b><br><span style="color:var(--red);font-weight:700">${e.score}</span> → <span style="color:#2A7A2A;font-weight:700">${e.hypo}</span></td>
      <td>${swingBadge(e.swing)}</td>
      <td style="color:var(--muted);font-size:12px;font-weight:700">J${e.gw}·${e.season}</td>
      <td><span class="owner-badge" style="background:${col}" title="${ownerName}">${ini}</span></td>
    </tr>`;
  }).join('');
  return `<table class="stat-table">
    <thead><tr>
      <th></th><th>Joueur</th><th>Buts</th>
      <th>Condition non remplie</th><th>Score réel → hypothétique</th>
      <th>Impact</th><th>J/S</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderEnteredSubs(pid) {
  const data = (DATA.entered_decisive || []).filter(e => !pid || e.owner === pid);
  if (!data.length) return '<p class="no-data">Aucun changement réussi décisif pour ce joueur</p>';
  const rows = data.map((e, i) => {
    const col = (DATA.colors || {})[e.owner] || '#888';
    const ini = PLAYER_INITIALS[e.owner] || '?';
    const ownerName = (DATA.display_names || {})[e.owner] || e.owner;
    const oppName = (DATA.display_names || {})[e.opponent] || e.opponent || '?';
    return `<tr>
      ${rankCell(i)}
      <td class="name-cell">${e.sub}</td>
      <td><span class="hat-badge">⚽ ${e.goals} buts · ${e.rating}</span></td>
      <td style="font-size:12px;color:var(--muted)">remplace <b style="color:var(--text)">${e.replaced || '?'}</b></td>
      <td style="font-size:12px">vs <b>${oppName}</b><br><span style="color:var(--muted);font-weight:700">${e.hypo}</span> → <span style="color:#2A7A2A;font-weight:700">${e.score}</span></td>
      <td>${swingBadge(e.swing)}</td>
      <td style="color:var(--muted);font-size:12px;font-weight:700">J${e.gw}·${e.season}</td>
      <td><span class="owner-badge" style="background:${col}" title="${ownerName}">${ini}</span></td>
    </tr>`;
  }).join('');
  return `<table class="stat-table">
    <thead><tr>
      <th></th><th>Joueur</th><th>Buts</th>
      <th>Remplace</th><th>Sans lui → Score final</th>
      <th>Impact</th><th>J/S</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderSubImpact() {
  const playerBtns = [
    `<button class="player-tab active" id="sub-filter-all" onclick="selectSubFilter(null)">Tous</button>`,
    ...(DATA.mpg_players || []).map(pid => {
      const col = (DATA.colors || {})[pid] || '#888';
      const name = (DATA.display_names || {})[pid] || pid;
      return `<button class="player-tab" id="sub-filter-${pid}" onclick="selectSubFilter('${pid}')">
        <span class="player-dot" style="background:${col}"></span>${name}
      </button>`;
    })
  ].join('');
  const nm = (DATA.missed_decisive || []).length;
  const ne = (DATA.entered_decisive || []).length;
  return `
    <div class="filter-tabs" style="margin-bottom:12px">${playerBtns}</div>
    <div id="sub-kpis">${renderSubKpis(null)}</div>
    <div class="sub-tabs">
      <button class="sub-tab active" id="sub-tab-missed" onclick="selectSubTab('missed')">🚫 Ratés (${nm})</button>
      <button class="sub-tab" id="sub-tab-entered" onclick="selectSubTab('entered')">✅ Réussis (${ne})</button>
    </div>
    <div id="sub-content-missed">${renderMissedSubs(null)}</div>
    <div id="sub-content-entered" style="display:none">${renderEnteredSubs(null)}</div>`;
}

function selectSubTab(tab) {
  _subTab = tab;
  ['missed','entered'].forEach(t => {
    document.getElementById('sub-tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('sub-content-' + t).style.display = t === tab ? '' : 'none';
  });
}

function selectSubFilter(pid) {
  _subFilter = pid;
  // Update player filter buttons
  document.getElementById('sub-filter-all').classList.toggle('active', !pid);
  document.getElementById('sub-filter-all').style.background = pid ? '' : 'var(--blue)';
  document.getElementById('sub-filter-all').style.borderColor = pid ? '' : 'var(--blue)';
  document.getElementById('sub-filter-all').style.color = pid ? '' : '#fff';
  (DATA.mpg_players || []).forEach(p => {
    const btn = document.getElementById('sub-filter-' + p);
    const active = p === pid;
    const col = (DATA.colors || {})[p] || '#888';
    btn.classList.toggle('active', active);
    btn.style.background = active ? col : '';
    btn.style.borderColor = active ? col : '';
    btn.style.color = active ? '#fff' : '';
  });
  // Re-render KPIs + both tab contents
  document.getElementById('sub-kpis').innerHTML = renderSubKpis(pid);
  document.getElementById('sub-content-missed').innerHTML = renderMissedSubs(pid);
  document.getElementById('sub-content-entered').innerHTML = renderEnteredSubs(pid);
}

// ── Render all sections ────────────────────────────────────────────────────
(function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = [
    section('⚽', 'Top Buteurs All-Time', 's1', renderTopScorers()),
    section('🌟', 'Crème de la crème', 's2', renderBestPlayers()),
    section('💀', "Boulets d'or", 's3', renderWorstPlayers()),
    section('❤️', 'Les Fidèles', 's4', renderMostUsed()),
    section('🎩', 'Hat-trick Club', 's5', renderHatTricks()),
    section('🔄', 'Changements Décisifs', 's8', renderSubImpact()),
    section('✈️', 'Le Voyageur', 's6', renderVoyageurs()),
    section('👤', 'Par joueur MPG', 's7', renderMpgSection()),
  ].join('');
  if (DATA.mpg_players && DATA.mpg_players.length)
    selectMpgPlayer(DATA.mpg_players[0]);
})();
</script>
