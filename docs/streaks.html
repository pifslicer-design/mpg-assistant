<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --blue:#4054CC; --green:#45C945; --red:#C0303A;
  --grad:linear-gradient(135deg,#4054CC 0%,#45C945 100%);
  --bg:#F4F6F8; --surface:#FFFFFF; --border:#D8DAE8;
  --text:#1A1F2E; --muted:#959DAF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);}

header{background:var(--grad);padding:40px 24px 48px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 50%,rgba(255,255,255,.08) 0%,transparent 60%);}
.hbadge{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:14px;}
header h1{font-size:clamp(24px,4vw,40px);font-weight:900;color:#fff;letter-spacing:-.5px;}
header p{margin-top:10px;font-size:15px;color:rgba(255,255,255,.8);font-weight:600;}

main{max-width:1000px;margin:-20px auto 40px;padding:0 20px;position:relative;z-index:1;}
.section-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}

/* ── STREAKS GRID ── */
.streaks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:28px;}
@media(max-width:700px){.streaks-grid{grid-template-columns:1fr;}}

.streak-block{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 18px;box-shadow:0 2px 8px rgba(64,84,204,.06);}
.streak-block-title{font-size:13px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.streak-icon{font-size:18px;}

.streak-row{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.streak-row[title]{cursor:help;}
.streak-rank{font-size:10px;font-weight:800;color:var(--muted);width:14px;text-align:right;flex-shrink:0;}
.streak-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.streak-name{font-size:12px;font-weight:800;width:64px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.streak-bar-wrap{flex:1;background:var(--bg);border-radius:4px;height:12px;overflow:hidden;}
.streak-bar{height:100%;border-radius:4px;min-width:4px;}
.streak-value{font-size:13px;font-weight:900;width:22px;text-align:right;flex-shrink:0;}
.ongoing-dot{font-size:9px;color:var(--green);flex-shrink:0;margin-left:1px;line-height:1;}

/* ── CURRENT SECTION ── */
.current-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 2px 8px rgba(64,84,204,.06);}
.current-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.current-header .section-title{margin-bottom:0;}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.tab-btn{background:var(--bg);border:1.5px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;font-family:inherit;}
.tab-btn:hover{border-color:var(--blue);color:var(--blue);}
.tab-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* ── CURRENT CARDS ── */
.current-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:600px){.current-grid{grid-template-columns:repeat(2,1fr);}}

.current-card{border-radius:12px;padding:14px 10px;border:1.5px solid;text-align:center;}
.current-name{font-size:12px;font-weight:800;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.current-badge{font-size:24px;font-weight:900;line-height:1;}
.current-label{font-size:10px;font-weight:700;margin-top:5px;text-transform:uppercase;letter-spacing:.5px;}
.current-tip{font-size:10px;color:var(--muted);font-weight:600;margin-top:5px;}
.current-ub{font-size:10px;color:var(--blue);font-weight:700;margin-top:3px;}
.live-dot{color:var(--green);font-size:10px;vertical-align:middle;}

footer{text-align:center;padding:28px;font-size:13px;color:var(--muted);font-weight:600;}
footer a{color:var(--blue);text-decoration:none;font-weight:700;}
footer span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;}
</style>
</head>

<script>
const STREAKS={"all_time":[{"pid":"raph","name":"Raph","color":"#C0303A","best_win":8,"best_win_tip":"J13 S11 → J6 S12","best_win_ongoing":false,"best_unbeaten":10,"best_unbeaten_tip":"J8 S4 → J3 S5","best_unbeaten_ongoing":false,"best_loss":5,"best_loss_tip":"J13 S8 → J3 S9","best_loss_ongoing":false},{"pid":"nico","name":"Nico","color":"#2E6A99","best_win":7,"best_win_tip":"J4 S18 → J10 S18","best_win_ongoing":false,"best_unbeaten":11,"best_unbeaten_tip":"J6 S3 → J2 S4","best_unbeaten_ongoing":false,"best_loss":4,"best_loss_tip":"J14 S5 → J3 S6","best_loss_ongoing":false},{"pid":"francois","name":"François","color":"#1E5C3A","best_win":6,"best_win_tip":"J3 S6 → J8 S6","best_win_ongoing":false,"best_unbeaten":12,"best_unbeaten_tip":"J12 S5 → J9 S6","best_unbeaten_ongoing":false,"best_loss":5,"best_loss_tip":"J12 S8 → J2 S9","best_loss_ongoing":false},{"pid":"damien","name":"Damien","color":"#C08A00","best_win":8,"best_win_tip":"J1 S1 → J8 S1","best_win_ongoing":false,"best_unbeaten":10,"best_unbeaten_tip":"J9 S2 → J4 S3","best_unbeaten_ongoing":false,"best_loss":5,"best_loss_tip":"J3 S14 → J7 S14","best_loss_ongoing":false},{"pid":"greg","name":"Greg","color":"#D4643A","best_win":5,"best_win_tip":"J13 S3 → J3 S4","best_win_ongoing":false,"best_unbeaten":9,"best_unbeaten_tip":"J8 S5 → J2 S6","best_unbeaten_ongoing":false,"best_loss":6,"best_loss_tip":"J9 S6 → J14 S6","best_loss_ongoing":false},{"pid":"marc","name":"Marc","color":"#1A3D50","best_win":5,"best_win_tip":"J11 S9 → J1 S10","best_win_ongoing":false,"best_unbeaten":7,"best_unbeaten_tip":"J8 S12 → J14 S12","best_unbeaten_ongoing":false,"best_loss":6,"best_loss_tip":"J8 S15 → J13 S15","best_loss_ongoing":false},{"pid":"pierre","name":"Pierre","color":"#2A8FA0","best_win":5,"best_win_tip":"J11 S9 → J1 S10","best_win_ongoing":false,"best_unbeaten":7,"best_unbeaten_tip":"J11 S9 → J3 S10","best_unbeaten_ongoing":false,"best_loss":10,"best_loss_tip":"J9 S17 → J4 S18","best_loss_ongoing":false},{"pid":"manu","name":"Manu","color":"#7A1A1E","best_win":5,"best_win_tip":"J1 S18 → J5 S18","best_win_ongoing":false,"best_unbeaten":7,"best_unbeaten_tip":"J13 S3 → J5 S4","best_unbeaten_ongoing":false,"best_loss":5,"best_loss_tip":"J12 S2 → J2 S3","best_loss_ongoing":false}],"prev_season":[{"pid":"raph","name":"Raph","color":"#C0303A","type":"W","length":1,"tip":"depuis J14 S18","unbeaten":1,"unbeaten_tip":""},{"pid":"nico","name":"Nico","color":"#2E6A99","type":"L","length":1,"tip":"depuis J14 S18","unbeaten":0,"unbeaten_tip":""},{"pid":"francois","name":"François","color":"#1E5C3A","type":"L","length":4,"tip":"depuis J11 S18","unbeaten":0,"unbeaten_tip":""},{"pid":"damien","name":"Damien","color":"#C08A00","type":"W","length":1,"tip":"depuis J14 S18","unbeaten":1,"unbeaten_tip":""},{"pid":"greg","name":"Greg","color":"#D4643A","type":"W","length":4,"tip":"depuis J11 S18","unbeaten":4,"unbeaten_tip":""},{"pid":"marc","name":"Marc","color":"#1A3D50","type":"W","length":3,"tip":"depuis J12 S18","unbeaten":3,"unbeaten_tip":""},{"pid":"pierre","name":"Pierre","color":"#2A8FA0","type":"L","length":2,"tip":"depuis J13 S18","unbeaten":0,"unbeaten_tip":""},{"pid":"manu","name":"Manu","color":"#7A1A1E","type":"L","length":1,"tip":"depuis J14 S18","unbeaten":0,"unbeaten_tip":""}],"live":[{"pid":"raph","name":"Raph","color":"#C0303A","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":3,"unbeaten_tip":"depuis J3 S19","is_live":true},{"pid":"nico","name":"Nico","color":"#2E6A99","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":2,"unbeaten_tip":"depuis J4 S19","is_live":true},{"pid":"francois","name":"François","color":"#1E5C3A","type":"W","length":4,"tip":"depuis J2 S19","unbeaten":4,"unbeaten_tip":"","is_live":true},{"pid":"damien","name":"Damien","color":"#C08A00","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":6,"unbeaten_tip":"depuis J14 S18","is_live":true},{"pid":"greg","name":"Greg","color":"#D4643A","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":1,"unbeaten_tip":"","is_live":true},{"pid":"marc","name":"Marc","color":"#1A3D50","type":"L","length":3,"tip":"depuis J3 S19","unbeaten":0,"unbeaten_tip":"","is_live":true},{"pid":"pierre","name":"Pierre","color":"#2A8FA0","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":1,"unbeaten_tip":"","is_live":true},{"pid":"manu","name":"Manu","color":"#7A1A1E","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":1,"unbeaten_tip":"","is_live":true}],"season_only":[{"pid":"raph","name":"Raph","color":"#C0303A","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":3,"unbeaten_tip":"depuis J3 S19"},{"pid":"nico","name":"Nico","color":"#2E6A99","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":2,"unbeaten_tip":"depuis J4 S19"},{"pid":"francois","name":"François","color":"#1E5C3A","type":"W","length":4,"tip":"depuis J2 S19","unbeaten":4,"unbeaten_tip":""},{"pid":"damien","name":"Damien","color":"#C08A00","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":5,"unbeaten_tip":"depuis J1 S19"},{"pid":"greg","name":"Greg","color":"#D4643A","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":1,"unbeaten_tip":""},{"pid":"marc","name":"Marc","color":"#1A3D50","type":"L","length":3,"tip":"depuis J3 S19","unbeaten":0,"unbeaten_tip":""},{"pid":"pierre","name":"Pierre","color":"#2A8FA0","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":1,"unbeaten_tip":""},{"pid":"manu","name":"Manu","color":"#7A1A1E","type":"D","length":1,"tip":"depuis J5 S19","unbeaten":1,"unbeaten_tip":""}],"last_snum":18,"current_snum":19};

// ── Config ──
const TYPE_LABEL  = { W: 'Victoires', D: 'Nuls', L: 'Défaites' };
const TYPE_COLOR  = { W: '#45C945',   D: '#4054CC', L: '#C0303A' };
const TYPE_BG     = { W: 'rgba(69,201,69,0.10)',   D: 'rgba(64,84,204,0.10)',  L: 'rgba(192,48,58,0.10)' };
const TYPE_BORDER = { W: 'rgba(69,201,69,0.45)',   D: 'rgba(64,84,204,0.40)',  L: 'rgba(192,48,58,0.45)' };
const TYPE_EMOJI  = { W: '🔥', D: '⏸️', L: '❄️' };

// ── All-time blocks ──
function renderBlock(container, title, icon, color, key, tipKey, ongoingKey) {
  const block = document.createElement('div');
  block.className = 'streak-block';
  const sorted = [...STREAKS.all_time].sort((a, b) => b[key] - a[key]);
  const maxVal = sorted[0]?.[key] || 1;
  block.innerHTML = `<div class="streak-block-title"><span class="streak-icon">${icon}</span>${title}</div>`;

  sorted.forEach((p, i) => {
    const val     = p[key];
    const pct     = (val / maxVal * 100).toFixed(1);
    const ongoing = p[ongoingKey];
    const tip     = p[tipKey];
    const row     = document.createElement('div');
    row.className = 'streak-row';
    if (tip) row.title = tip + (ongoing ? ' · EN COURS' : '');
    row.innerHTML = `
      <span class="streak-rank">${i + 1}</span>
      <span class="streak-dot" style="background:${p.color}"></span>
      <span class="streak-name" title="${p.name}">${p.name}</span>
      <div class="streak-bar-wrap">
        <div class="streak-bar" style="width:${pct}%;background:${color}"></div>
      </div>
      <span class="streak-value" style="color:${color}">${val}</span>
      ${ongoing ? '<span class="ongoing-dot" title="Série active">●</span>' : ''}
    `;
    block.appendChild(row);
  });

  container.appendChild(block);
}

const grid = document.getElementById('streaksGrid');
renderBlock(grid, 'Série de victoires',  '🔥', '#45C945', 'best_win',      'best_win_tip',      'best_win_ongoing');
renderBlock(grid, 'Invaincu (V + N)',     '🛡️', '#4054CC', 'best_unbeaten', 'best_unbeaten_tip', 'best_unbeaten_ongoing');
renderBlock(grid, 'Série de défaites',   '💀', '#C0303A', 'best_loss',     'best_loss_tip',     'best_loss_ongoing');

// ── Current section ──
const TYPE_ORDER = { W: 0, D: 1, L: 2 };

function renderCurrentSection(mode) {
  const curGrid = document.getElementById('currentGrid');
  curGrid.innerHTML = '';
  const cards = STREAKS[mode] || [];
  const sorted = [...cards].sort((a, b) =>
    TYPE_ORDER[a.type] - TYPE_ORDER[b.type] || b.length - a.length
  );

  sorted.forEach(p => {
    const t      = p.type;
    const isLive = (mode === 'live') && p.is_live;
    const card   = document.createElement('div');
    card.className = 'current-card';
    card.style.background  = TYPE_BG[t];
    card.style.borderColor = TYPE_BORDER[t];

    const ubLine = (t !== 'L' && p.unbeaten > p.length)
      ? `<div class="current-ub">Invaincu : ${p.unbeaten}m${p.unbeaten_tip ? ' · ' + p.unbeaten_tip : ''}</div>`
      : '';

    card.innerHTML = `
      <div class="current-name" style="color:${p.color}">${p.name}${isLive ? ' <span class="live-dot" title="Série active en S actuelle">●</span>' : ''}</div>
      <div class="current-badge" style="color:${TYPE_COLOR[t]}">${p.length}${t === 'W' ? 'V' : t === 'D' ? 'N' : 'D'}</div>
      <div class="current-label" style="color:${TYPE_COLOR[t]}">${TYPE_EMOJI[t]} ${TYPE_LABEL[t]}</div>
      ${p.tip ? `<div class="current-tip">${p.tip}</div>` : ''}
      ${ubLine}
    `;
    curGrid.appendChild(card);
  });

  if (sorted.length === 0) {
    curGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:20px;font-size:13px;">Aucune donnée disponible</div>';
  }
}

// ── Tabs ──
const MODES = ['prev_season', 'live', 'season_only'];
const lastS = STREAKS.last_snum;
const curS  = STREAKS.current_snum;
const MODE_LABELS   = [`Fin S${lastS}`, 'En cours', curS ? `S${curS}` : 'S. act.'];
const MODE_TITLES   = [
  `Série en cours · fin S${lastS}`,
  'Série en cours · toutes saisons',
  `Série en cours · S${curS || 'act.'}`,
];

let activeMode = 'prev_season';
const tabsContainer = document.getElementById('filterTabs');

MODES.forEach((mode, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (mode === activeMode ? ' active' : '');
  btn.textContent = MODE_LABELS[i];
  btn.onclick = () => {
    activeMode = mode;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('currentSectionTitle').textContent = MODE_TITLES[i];
    renderCurrentSection(mode);
  };
  tabsContainer.appendChild(btn);
});

// Initial render
document.getElementById('hbadge').textContent = STREAKS.last_snum + ' saisons · cross-divisions';
document.getElementById('currentSectionTitle').textContent = MODE_TITLES[0];
renderCurrentSection(activeMode);
</script>
</body>
